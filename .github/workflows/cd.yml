name: CD

on:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write # npm provenance
      contents: write # create releases and push changesets
      pull-requests: write # create changeset PRs
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          # Release only, for provenance
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset publish
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build DXT file
        if: steps.changesets.outputs.published == 'true'
        run: pnpm build:dxt

      - name: Setup DXT certificates
        if: steps.changesets.outputs.published == 'true'
        run: |
          mkdir -p ./certs
          echo "${{ secrets.DXT_CA_PEM }}" > ./certs/ca.pem
          echo "${{ secrets.DXT_CERT_PEM }}" > ./certs/cert.pem
          echo "${{ secrets.DXT_KEY_PEM }}" > ./certs/key.pem
          chmod 600 ./certs/*.pem

      - name: Sign DXT file
        if: steps.changesets.outputs.published == 'true'
        run: dxt sign portone-mcp-server.dxt --cert ./certs/cert.pem --key ./certs/key.pem --intermediate ./certs/ca.pem

      - name: Verify DXT signature
        if: steps.changesets.outputs.published == 'true'
        run: dxt verify portone-mcp-server.dxt

      - name: Cleanup certificates
        if: steps.changesets.outputs.published == 'true'
        run: rm -rf ./certs

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        run: |
          gh release create "v$VERSION" portone-mcp-server.dxt \
            --title "v$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ fromJson(steps.changesets.outputs.publishedPackages)[0].version }}
